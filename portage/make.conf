# THIS IS A /etc/portage/make.conf FILE
# FOR Zentaro's MARCH_NATIVE

# PRE-OPTS
LC_MESSAGES=C.UTF-8
ACCEPT_LICENSE="*"
L10N="en_AU"
GENTOO_MIRRORS="http://au.mirrors.cicku.me/gentoo/"

## Flag
_USE_BASIC_HUMAN_RIGHTS="-telemetry -geolocation -test -debug"
_USE_HOST="dist-kernel -clang -systemd lto rust openrc elogind dbus udev libnotify"
_USE_USERSPACE="X wayland -kde -qt5 -qt6 -gnome gtk gtk3 imagemagick cairo lcms"
_USE_GRAPHICS="opengl vulkan sdl"
_USE_HWACCEL="vaapi opencl cuda nvenc"
_USE_MEDIA="ffmpeg v4l vpx x264 -gstreamer"
_USE_AUDIO="pulseaudio alsa opus lame ogg vorbis"
USE="${_USE_BASIC_HUMAN_RIGHTS} ${_USE_HOST} ${_USE_USERSPACE} ${_USE_GRAPHICS} ${_USE_HWACCEL} ${_USE_MEDIA} ${_USE_AUDIO}"
VIDEO_CARDS="intel nvidia"

INSTALL_MASK="INSTALL.gz TODO.gz"
PORTAGE_TMPDIR="/var/tmp"

## Toolchain
COMMON_FLAGS="-march=native -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
RUSTFLAGS="${RUSTFLAGS} -C target-cpu=native"

## Log
PORTAGE_LOGDIR="/var/log/portage"
PORTAGE_ELOG_CLASSES="log warn error"
PORTAGE_ELOG_SYSTEM="echo save"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

# OPTS
PORTAGE_RSYNC_RETRIES="3"
AUTOCLEAN="yes"

## Throughput-tuning
EMERGE_DEFAULT_OPTS="${EMERGE_DEFAULT_OPTS} --verbose --jobs=6 --load-average=12"
MAKEOPTS="--jobs=6 --load-average=12"
PORTAGE_NICENESS=8
PORTAGE_SCHEDULING_POLICY="idle" # other/idle
FEATURES="parallel-fetch parallel-install -test"

