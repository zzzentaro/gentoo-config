# THIS IS HYPRLAND WM CONFIG FILE

# Source the theme
source=~/.config/hypr/theme-mizu.conf

# Connected device
monitor = ,preferred,auto,1
input {
    kb_layout = us
    # Cursor will change focus
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

# Start hyprland
## 1) Export variables
### a. Graphics
#### VAAPI
env = LIBVA_DRIVER_NAME,iHD
#### Mesa: Generic Buffer Management
env = GBM_BACKEND,nvidia-drm
#### OpenGL (I use nvda, don't offload by default)
env = __GLX_VENDOR_LIBRARY_NAME,#nvidia
env = __VK_LAYER_NV_optimus,#NVIDIA_only
env = __NV_PRIME_RENDER_OFFLOAD_PROVIDER,NVIDIA-GO
env = __NV_PRIME_RENDER_OFFLOAD,0
### b. Interface
#### GDK (GIMP (GNU (GNU's Not Unix) Image Manipulation Program) Drawing Kit)
env = GDK_BACKEND,wayland,x11,*
##### Qt
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
## 2) Execute programs
exec-once = pipewire & pipewire-pulse & wireplumber
exec-once = waybar & hyprpaper & mako & wl-clip-persist --clipboard regular
## 3) Reset settings
exec-once = brightnessctl set 10% % & powerprofilesctl set power-saver

# Bind
$MOD = SUPER

bind = $MOD, h, movefocus, left
bind = $MOD, j, movefocus, down
bind = $MOD, k, movefocus, up
bind = $MOD, l, movefocus, right

# Move tiled window
bind = $MOD SHIFT, h, movewindow, left
bind = $MOD SHIFT, j, movewindow, down
bind = $MOD SHIFT, k, movewindow, up
bind = $MOD SHIFT, l, movewindow, right

# Move floating window
binde = $MOD CTRL, h, moveactive, -25 0
binde = $MOD CTRL, j, moveactive, 0 25
binde = $MOD CTRL, k, moveactive, 0 -25
binde = $MOD CTRL, l, moveactive, 25 0

bind = $MOD, 1, workspace, 1
bind = $MOD, 2, workspace, 2
bind = $MOD, 3, workspace, 3
bind = $MOD, 4, workspace, 4
bind = $MOD, 5, workspace, 5
bind = $MOD, 6, workspace, 6
bind = $MOD, 7, workspace, 7
bind = $MOD, 8, workspace, 8
bind = $MOD, 9, workspace, 9
bind = $MOD, 0, workspace, 10

bind = $MOD SHIFT, 1, movetoworkspace, 1
bind = $MOD SHIFT, 2, movetoworkspace, 2
bind = $MOD SHIFT, 3, movetoworkspace, 3
bind = $MOD SHIFT, 4, movetoworkspace, 4
bind = $MOD SHIFT, 5, movetoworkspace, 5
bind = $MOD SHIFT, 6, movetoworkspace, 6
bind = $MOD SHIFT, 7, movetoworkspace, 7
bind = $MOD SHIFT, 8, movetoworkspace, 8
bind = $MOD SHIFT, 9, movetoworkspace, 9
bind = $MOD SHIFT, 0, movetoworkspace, 10

# Fn
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Commence customisation!
bind = $MOD CTRL, Q, killactive,

bind = $MOD, F, togglefloating,
bind = $MOD CTRL, F, focuscurrentorlast
bind = $MOD SHIFT, F, fullscreen, 0

bind = $MOD Alt, L, exec, hyprlock
bind = $MOD ALT, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

$terminal = alacritty
bind = $MOD, Return, exec, $terminal
$terminalFloat = alacritty -T floatty

bind = $MOD ALT, Return, exec, $terminalFloat

$fileManager = pcmanfm
bind = $MOD, E, exec, $fileManager

$browser = firefox-bin
bind = $MOD, B, exec, $browser

$launcher = fuzzel
bind = $MOD, Space, exec, $launcher

# ~/.local/bin/menu
bind = $MOD, C, exec, menu

# Print screen
$psf = $(xdg-user-dir PICTURES)/Screenshots/ps_$(date +"%Y%m%d%H%M%S").png
bind = ,Print,exec,grim - | tee $psf | wl-copy
bind = SHIFT,Print,exec,grim -g "$(slurp)" - | swappy -f - -o $psf

# Rat
bind = $MOD, mouse_down, workspace, e+1
bind = $MOD, mouse_up, workspace, e-1
bindm = $MOD, mouse:272, movewindow
bindm = $MOD, mouse:273, resizewindow

# Submap: reize
bind = $MOD, R, submap, resize
submap = resize
binde = , h, resizeactive, -25 0
binde = , j, resizeactive, 0 25
binde = , k, resizeactive, 0 -25
binde = , l, resizeactive, 25 0
bind = , escape, submap, reset
submap = reset

# Appearance
general {
    layout = scrolling
    gaps_in = 0
    gaps_out = 0
    border_size = 2

    col.active_border = $primary
    col.inactive_border = $muted

    resize_on_border = false

    allow_tearing = true
}
scrolling {
    fullscreen_on_one_column = true
    focus_fit_method = 1
    column_width = 0.9
    direction = down
}
decoration {
    rounding = 0
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow:enabled = false
    blur:enabled = false
}
animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# Rule (latest takes priority)
windowrule = match:class *, size 1 1
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = float-terminal
    match:title = floatty
    float = yes
    move = 12 48
    size = 1400 1020
}

windowrule {
    name = browser
    match:class = firefox
    workspace = 2 silent
}

windowrule = match:class steam, workspace 8 silent
windowrule = match:class discord, workspace 8 silent

windowrule {
    name = gryphlink
    match:title = GRYPHLINK
    workspace = 10 silent
    float = yes
    rounding = 32
    border_color = $secondary
}
windowrule {
    name = hsr
    match:class = moe.launcher.the-honkers-railway-launcher
    workspace = 10 silent
    rounding = 32
    float = yes
    border_color = $tertiary
}

windowrule = match:class Waydroid, workspace 9 silent
windowrule {
    name = endfield
    match:title = Endfield
    workspace = 9 silent
    rounding = 0
    fullscreen = true
}

