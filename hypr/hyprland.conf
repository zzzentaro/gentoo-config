# --- --- --- --- --- --- --- --- ---
# > rose pine
# --- --- --- --- --- --- --- --- ---
$base           = 0xff191724
$surface        = 0xff1f1d2e
$overlay        = 0xff26233a
$muted          = 0xff6e6a86
$subtle         = 0xff908caa
$text           = 0xffe0def4
$love           = 0xffeb6f92
$gold           = 0xfff6c177
$rose           = 0xffebbcba
$pine           = 0xff31748f
$foam           = 0xff9ccfd8
$iris           = 0xffc4a7e7
$highlightLow   = 0xff21202e
$highlightMed   = 0xff403d52
$highlightHigh  = 0xff524f67

# --- --- --- --- --- --- --- --- ---
# > connected device
# --- --- --- --- --- --- --- --- ---
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

# --- --- --- --- --- --- --- --- ---
# > initialise hypr environemnt
# --- --- --- --- --- --- --- --- ---
monitor = ,preferred,auto,1

# - > start program -
exec-once = pipewire & pipewire-pulse & wireplumber
exec-once = waybar & hyprpaper & mako & wl-clip-persist --clipboard regular

# - > run command -
exec-once = brightnessctl set 20% & powerprofilesctl set power-saver

# - > define variable -
$Mod = SUPER
$terminal = alacritty
$terminalFloat = alacritty -T floatty
$fileManager = pcmanfm
$browser = firefox
$menu = fuzzel

env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia

env = XCURSOR_THEME,BreezeX-RosePineDawn
env = XCURSOR_SIZE,48
env = HYPRCURSOR_THEME,rose-pine-dawn-hyprcursor
env = HYPRCURSOR_SIZE,48

env = GTK_THEME,RosePine
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# --- --- --- --- --- --- --- --- ---
# > bind key to action
# --- --- --- --- --- --- --- --- ---

# - > base -
bind = $Mod, h, movefocus, left
bind = $Mod, j, movefocus, down
bind = $Mod, k, movefocus, up
bind = $Mod, l, movefocus, right

bind = $Mod SHIFT, h, movewindow, left
bind = $Mod SHIFT, j, movewindow, down
bind = $Mod SHIFT, k, movewindow, up
bind = $Mod SHIFT, l, movewindow, right

bind = $Mod, 1, workspace, 1
bind = $Mod, 2, workspace, 2
bind = $Mod, 3, workspace, 3
bind = $Mod, 4, workspace, 4
bind = $Mod, 5, workspace, 5
bind = $Mod, 6, workspace, 6
bind = $Mod, 7, workspace, 7
bind = $Mod, 8, workspace, 8
bind = $Mod, 9, workspace, 9
bind = $Mod, 0, workspace, 10

bind = $Mod SHIFT, 1, movetoworkspace, 1
bind = $Mod SHIFT, 2, movetoworkspace, 2
bind = $Mod SHIFT, 3, movetoworkspace, 3
bind = $Mod SHIFT, 4, movetoworkspace, 4
bind = $Mod SHIFT, 5, movetoworkspace, 5
bind = $Mod SHIFT, 6, movetoworkspace, 6
bind = $Mod SHIFT, 7, movetoworkspace, 7
bind = $Mod SHIFT, 8, movetoworkspace, 8
bind = $Mod SHIFT, 9, movetoworkspace, 9
bind = $Mod SHIFT, 0, movetoworkspace, 10

# - > function key -
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# - > special -
bind = $Mod SHIFT, Q, killactive,
bind = $Mod, F, togglefloating,
bind = $Mod CTRL, F, focuscurrentorlast
bind = $Mod SHIFT, F, fullscreen, 0

bind = $Mod ALT, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

bind = $Mod, Return, exec, $terminal
bind = $Mod, E, exec, $fileManager
bind = $Mod, B, exec, $browser
bind = $Mod, Space, exec, $menu
bind = $Mod, C, exec, menu

bind = $Mod ALT, Return, exec, $terminalFloat

# - > printscreen -
$psf = $(xdg-user-dir PICTURES)/Screenshots/ps_$(date +"%Y%m%d%H%M%S").png
bind = ,Print, exec, grim - | tee $psf | wl-copy
bind = Control, Print, exec, grim -g "$(slurp)" - | swappy -f - -o $psf

# - > rat -
bind = $Mod, mouse_down, workspace, e+1
bind = $Mod, mouse_up, workspace, e-1
bindm = $Mod, mouse:272, movewindow
bindm = $Mod, mouse:273, resizewindow

# - > resize -
bind = $Mod, R, submap, resize
submap = resize
binde = , h, resizeactive, -25 0
binde = , j, resizeactive, 0 25
binde = , k, resizeactive, 0 -25
binde = , l, resizeactive, 25 0
bind = , escape, submap, reset
submap = reset

# --- --- --- --- --- --- --- --- ---
# > window management
# --- --- --- --- --- --- --- --- ---

# - > appearance -
general {
    layout = scrolling
    gaps_in = 0
    gaps_out = 0
    border_size = 2

    col.active_border = $love
    col.inactive_border = $muted

    resize_on_border = false

    allow_tearing = true
}
scrolling {
    fullscreen_on_one_column = true
    focus_fit_method = 1
    column_width = 0.9
    direction = down
}
decoration {
    rounding = 0
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow:enabled = false
    blur:enabled = false
}
animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# - > rule -
windowrule = match:class *, size 0.9 0.9
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# - > workspace 2 -
windowrule {
    name = browser
    match:class = firefox-esr
    workspace = 2 silent
}

# - > workspace 8 -
windowrule = match:class steam, workspace 8 silent
windowrule = match:class vesktop, workspace 8 silent

# - > workspace 10 -
windowrule {
    name = gryphlink
    match:class = steam_app_0
    workspace = 10 silent
    float = yes
    rounding = 32
    border_color = $gold
}
windowrule {
    name = hsr
    match:class = moe.launcher.the-honkers-railway-launcher
    workspace = 10 silent
    rounding = 32
    float = yes
    border_color = $iris
}

# - > workspace 9 -
windowrule = match:class Waydroid, workspace 9 silent
windowrule {
    name = endfield
    match:title = Endfield
    workspace = 9 silent
    rounding = 0
    fullscreen = true
}

